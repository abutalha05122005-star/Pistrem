version: "3.8"

services:
  backend:
    build: .
    container_name: pistream-backend
    ports:
      - "${TORRENT_PORT:-3000}:3000"
    environment:
      - PORT=3000
      - REDIS_URL=redis://redis:6379
      - TORRENT_PORT=${TORRENT_PORT:-3000}
      - MAX_CACHE_SIZE=${MAX_CACHE_SIZE:-52428800000} # 50GB
      - TEMP_DIR=/tmp/streamcache
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:-SuperSecureStreamingEncryptionKey123}
    volumes:
      - stream-cache:/tmp/streamcache
    depends_on:
      - redis
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: pistream-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped

volumes:
  stream-cache:
    driver: local
  redis-data:
    driver: local
