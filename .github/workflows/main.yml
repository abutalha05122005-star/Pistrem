name: Build Android APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up Java JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Install Dependencies & Sanitize Config
        run: |
          PKG_JSON=$(find . -name package.json -not -path "*/node_modules/*" -not -path "*/.git/*" | head -n 1)
          if [ -z "$PKG_JSON" ]; then
            echo "::error::Could not find package.json anywhere!"
            exit 1
          fi
          
          DIR=$(dirname "$PKG_JSON")
          cd "$DIR"
          
          echo "Installing project dependencies..."
          npm install --legacy-peer-deps || npm install
          
          # Safe Node inline utility to strip custom asset requirements
          node -e "
          const fs = require('fs');
          const file = './app.json';
          if (fs.existsSync(file)) {
            try {
              let json = JSON.parse(fs.readFileSync(file, 'utf8'));
              if (json.expo) {
                delete json.expo.icon;
                delete json.expo.splash;
                if (json.expo.android) {
                  delete json.expo.android.adaptiveIcon;
                }
                fs.writeFileSync(file, JSON.stringify(json, null, 2));
                console.log('Successfully neutralized custom asset fields.');
              }
            } catch (e) {
              console.log('Skipping modification due to read error:', e);
            }
          } else {
            fs.writeFileSync(file, JSON.stringify({
              expo: {
                name: 'App',
                slug: 'app-project',
                version: '1.0.0',
                android: { package: 'com.custom.myapp' }
              }
            }, null, 2));
            console.log('Created baseline app.json wrapper.');
          }
          "

          # Generate clean native Android files without asset conflicts
          GRADLEW_PATH=$(find . -name gradlew -not -path "*/node_modules/*" -not -path "*/.git/*" | head -n 1)
          if [ -z "$GRADLEW_PATH" ]; then
            echo "--> Compiling missing Android system directories..."
            npx expo prebuild --platform android --no-install --clean
          fi

      - name: Build Android APK
        run: |
          GRADLEW_PATH=$(find . -name gradlew -not -path "*/node_modules/*" -not -path "*/.git/*" | head -n 1)
          if [ ! -z "$GRADLEW_PATH" ]; then
            DIR=$(dirname "$GRADLEW_PATH")
            chmod +x "$GRADLEW_PATH"
            cd "$DIR"
            ./gradlew assembleDebug -x lint
          else
            echo "::error::Failed to establish the Android gradle build engine."
            exit 1
          fi

      - name: Collect Generated APKs
        run: |
          mkdir -p apk-output
          find . -name "*.apk" -not -path "*/node_modules/*" -exec cp {} apk-output/ \;
          if [ -z "$(ls -A apk-output)" ]; then
            echo "::error::No APK files were found following build context execution!"
            exit 1
          fi

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: my-android-app
          path: apk-output/
          
