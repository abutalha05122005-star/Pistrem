name: Build Android APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up Java JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Install Dependencies & Auto-Generate Android Folder
        run: |
          PKG_JSON=$(find . -name package.json -not -path "*/node_modules/*" -not -path "*/.git/*" | head -n 1)
          if [ ! -z "$PKG_JSON" ]; then
            DIR=$(dirname "$PKG_JSON")
            cd "$DIR"
            echo "Installing npm dependencies..."
            npm install --legacy-peer-deps || npm install
            
            # Check if gradlew is missing
            GRADLEW_PATH=$(find . -name gradlew -not -path "*/node_modules/*" -not -path "*/.git/*" | head -n 1)
            if [ -z "$GRADLEW_PATH" ]; then
              echo "--> gradlew missing! Checking if this is an Expo project..."
              if grep -q '"expo"' package.json; then
                echo "Expo detected! Dynamically generating android build directory..."
                npx expo prebuild --platform android --no-install
              else
                echo "Standard React Native detected. Generating missing android wrappers..."
                npx react-native ctx android || true
              fi
            fi
          fi

      - name: Build Android APK
        run: |
          GRADLEW_PATH=$(find . -name gradlew -not -path "*/node_modules/*" -not -path "*/.git/*" | head -n 1)
          if [ ! -z "$GRADLEW_PATH" ]; then
            DIR=$(dirname "$GRADLEW_PATH")
            echo "Found Gradle environment in: $DIR"
            chmod +x "$GRADLEW_PATH"
            cd "$DIR"
            ./gradlew assembleDebug
          else
            echo "::error::Could not find or auto-generate the Android wrapper files. Please ensure your project source code is fully committed."
            exit 1
          fi

      - name: Collect Generated APKs
        run: |
          mkdir -p apk-output
          find . -name "*.apk" -not -path "*/node_modules/*" -exec cp {} apk-output/ \;
          if [ -z "$(ls -A apk-output)" ]; then
            echo "::error::Build completed but no APK files were generated!"
            exit 1
          fi

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: my-android-app
          path: apk-output/
          
