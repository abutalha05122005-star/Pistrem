name: Build Android APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up Java JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Auto-Generate Missing Android System
        run: |
          PKG_JSON=$(find . -name package.json -not -path "*/node_modules/*" -not -path "*/.git/*" | head -n 1)
          if [ -z "$PKG_JSON" ]; then
            echo "::error::Could not find package.json anywhere!"
            exit 1
          fi
          
          DIR=$(dirname "$PKG_JSON")
          cd "$DIR"
          
          GRADLEW_PATH=$(find . -name gradlew -not -path "*/node_modules/*" -not -path "*/.git/*" | head -n 1)
          if [ -z "$GRADLEW_PATH" ]; then
            echo "--> Android native files missing. Generating clean environment..."
            
            # Create a fallback app.json configuration if it doesn't exist
            if [ ! -f "app.json" ]; then
              echo '{"expo": {"name": "App", "slug": "app-project", "version": "1.0.0", "android": {"package": "com.custom.myapp"}}}' > app.json
            fi
            
            # Force install scaffolding tools
            npm install expo@latest --save-dev --legacy-peer-deps
            
            # Synthesize the native android build folder
            npx expo prebuild --platform android --no-install --clean
          fi
          
          echo "Installing all dependencies..."
          npm install --legacy-peer-deps || npm install

      - name: Build Android APK
        run: |
          GRADLEW_PATH=$(find . -name gradlew -not -path "*/node_modules/*" -not -path "*/.git/*" | head -n 1)
          if [ ! -z "$GRADLEW_PATH" ]; then
            DIR=$(dirname "$GRADLEW_PATH")
            chmod +x "$GRADLEW_PATH"
            cd "$DIR"
            ./gradlew assembleDebug -x lint
          else
            echo "::error::Failed to generate the Android build system."
            exit 1
          fi

      - name: Collect Generated APKs
        run: |
          mkdir -p apk-output
          find . -name "*.apk" -not -path "*/node_modules/*" -exec cp {} apk-output/ \;
          if [ -z "$(ls -A apk-output)" ]; then
            echo "::error::No APK files were generated!"
            exit 1
          fi

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: my-android-app
          path: apk-output/
          
