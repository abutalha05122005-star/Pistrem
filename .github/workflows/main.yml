name: Build Android APK

on:
  push:
    branches:
      - main
  workflow_dispatch: # Allows you to manually click "Run workflow" if needed

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up Java JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Auto-Detect Framework & Install Dependencies
        run: |
          PKG_JSON=$(find . -name package.json -not -path "*/node_modules/*" -not -path "*/.git/*" | head -n 1)
          if [ ! -z "$PKG_JSON" ]; then
            echo "=== React Native Project Detected ==="
            DIR=$(dirname "$PKG_JSON")
            cd "$DIR"
            npm install --legacy-peer-deps || npm install
          else
            echo "=== Native Android Project Detected (No package.json found) ==="
          fi

      - name: Auto-Detect Gradle & Build APK
        run: |
          GRADLEW_PATH=$(find . -name gradlew -not -path "*/node_modules/*" -not -path "*/.git/*" | head -n 1)
          if [ ! -z "$GRADLEW_PATH" ]; then
            DIR=$(dirname "$GRADLEW_PATH")
            echo "Found Gradle environment in: $DIR"
            chmod +x "$GRADLEW_PATH"
            cd "$DIR"
            ./gradlew assembleDebug
          else
            echo "::error::Could not find 'gradlew' wrapper anywhere in the repository. Ensure your project structure is fully committed."
            exit 1
          fi

      - name: Collect Generated APKs
        run: |
          mkdir -p apk-output
          find . -name "*.apk" -not -path "*/node_modules/*" -exec cp {} apk-output/ \;
          if [ -z "$(ls -A apk-output)" ]; then
            echo "::error::Build completed but no APK files were generated!"
            exit 1
          fi

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: my-android-app
          path: apk-output/
          
