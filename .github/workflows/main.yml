name: Android CI Build

on:
  push:
    branches: [ "main", "master", "develop" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code Repo
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Decode Debug Keystore
      run: |
        if [ -f debug.keystore.base64 ]; then
          base64 -d debug.keystore.base64 > debug.keystore
          echo "Debug keystore decoded successfully from base64"
        else
          echo "debug.keystore.base64 not found, creating a new debug keystore as fallback"
          keytool -genkey -v -keystore debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US"
        fi

    - name: Grant Execute Permission for Gradle Wrapper
      run: |
        if [ -f gradlew ]; then
          chmod +x gradlew
        else
          echo "Gradle wrapper script not found at root, writing a local wrapper fallback"
          gradle wrapper
          chmod +x gradlew
        fi

    - name: Build Debug APK
      run: ./gradlew assembleDebug --no-daemon

    - name: Rename APK for Release
      run: |
        mv app/build/outputs/apk/debug/app-debug.apk app/build/outputs/apk/debug/pistream-v.apk

    - name: Upload Compiled APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: PiStream-app-debug
        path: app/build/outputs/apk/debug/pistream-v.apk
        retention-days: 7

    - name: Create GitHub Release
      if: startsWith(github.ref, 'refs/tags/v')
      uses: softprops/action-gh-release@v2
      with:
        files: |
          app/build/outputs/apk/debug/pistream-v.apk
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
